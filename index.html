<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 40px;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #event-display {
      text-align: center;
    }

    #event-name {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      min-height: 5rem;
      transition: color 0.1s;
    }

    #event-detail {
      font-size: 1rem;
      color: #555;
      margin-top: 12px;
      font-family: monospace;
      min-height: 1.4em;
    }

    #flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.05s;
    }

    #log {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-label {
      font-size: 0.75rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .log-entry {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.15s ease;
    }

    .log-entry .action { font-weight: 600; }
    .log-entry .time { color: #444; font-size: 0.75rem; font-family: monospace; }

    .UP { color: #4ade80; }
    .DOWN { color: #60a5fa; }
    .DOUBLE_UP { color: #facc15; }
    .DOUBLE_DOWN { color: #f97316; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #hint {
      font-size: 0.8rem;
      color: #333;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
  </style>
</head>
<body tabindex="0">

<div id="flash"></div>

<h1>Button Tester</h1>

<div id="event-display">
  <div id="event-name" class="—">—</div>
  <div id="event-detail">press a button to start</div>
</div>

<div id="log">
  <div class="log-label">Last events</div>
</div>

<p id="hint">Press spacebar — single, double, or triple. Each pattern is detected after a short pause.</p>

<script>
  const WINDOW_MS = 400; // time to wait for more presses

  let pressCount = 0;
  let timer = null;

  const eventName = document.getElementById('event-name');
  const eventDetail = document.getElementById('event-detail');
  const flash = document.getElementById('flash');
  const log = document.getElementById('log');

  const actions = {
    1: { label: 'SINGLE',  color: '#4ade80' },
    2: { label: 'DOUBLE',  color: '#facc15' },
    3: { label: 'TRIPLE',  color: '#f97316' },
  };

  function fireAction(count) {
    const action = actions[count] || { label: `×${count}`, color: '#fff' };

    eventName.textContent = action.label;
    eventName.style.color = action.color;
    eventDetail.textContent = `${count} press${count > 1 ? 'es' : ''} detected`;

    flash.style.background = action.color;
    flash.style.opacity = '0.15';
    setTimeout(() => flash.style.opacity = '0', 150);

    addLog(action.label, count);
  }

  function addLog(label, count) {
    const now = new Date();
    const time = now.toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="action" style="color:${actions[count]?.color||'#fff'}">${label}</span><span class="time">${time}</span>`;

    const logLabel = log.querySelector('.log-label');
    logLabel.after(entry);

    const entries = log.querySelectorAll('.log-entry');
    if (entries.length > 5) entries[entries.length - 1].remove();
  }

  // Auto-focus so no click needed first
  document.body.focus();

  // Prevent spacebar from scrolling
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') e.preventDefault();
  }, { capture: true });

  document.addEventListener('keydown', (e) => {
    if (e.key !== ' ') return;
    e.preventDefault();
    if (e.repeat) return; // ignore held key

    pressCount++;

    clearTimeout(timer);
    timer = setTimeout(() => {
      fireAction(pressCount);
      pressCount = 0;
    }, WINDOW_MS);
  });
</script>

</body>
</html>
