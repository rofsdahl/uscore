<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Padel Score</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: blue;
  color: white;
  font-size: 6vw;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  width: 100vw;
  height: 100vh;
  display: flex;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

#left, #right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#top-left, #top-right {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1vh 3vw;
}

#points-left, #points-right {
  flex: 1;
  text-align: center;
  font-size: 28vw;
  font-weight: 800;
  line-height: 1;
}

#divider {
  width: 60px;
  flex-shrink: 0;
}

#keepalive {
  display: block;
  width: 20px;
  height: 100%;
  margin: 0 auto;
}
  </style>
</head>
<body tabindex="0">

<div id="left">
  <div id="top-left">
    <div onclick="reset()">♻♲</div>
    <div id="games-left"></div>
  </div>
  <div id="points-left" onclick="addPoint(0)">0</div>
</div>
<div id="divider">
  <video id="keepalive" autoplay playsinline muted loop></video>
</div>
<div id="right">
  <div id="top-right">
    <div id="games-right"></div>
    <div onclick="undo()">⌫</div>
  </div>
  <div id="points-right" onclick="addPoint(1)">0</div>
</div>

<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];

  let history = [];
  let state = freshState();

  function freshState() {
    return { points: [0, 0], games: [0, 0] };
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const opposite = 1 - side;
    const p = state.points;

    if (p[side] < 3) {
      p[side]++;
    } else if (p[side] === 3 && p[opposite] < 3) {
      winGame(side);
    } else if (p[side] === 3 && p[opposite] === 3) {
      p[side] = 4;
    } else if (p[side] === 4) {
      winGame(side);
    } else if (p[opposite] === 4) {
      p[opposite] = 3;
    }

    render();
    chime();
  }

  function winGame(side) {
    state.points = [0, 0];
    state.games[side]++;
  }

  function undo() {
    if (history.length === 0) return;
    state = history.pop();
    render();
  }

  function reset() {
    history = [];
    state = freshState();
    render();
  }

  function render() {
    document.getElementById('points-left').textContent = POINTS[state.points[0]];
    document.getElementById('points-right').textContent = POINTS[state.points[1]];
    document.getElementById('games-left').textContent = state.games[0];
    document.getElementById('games-right').textContent = state.games[1];
  }
 
  render();

  // ── Button input ───────────────────────────────────────────────
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;

  document.body.focus();
  window.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); }, { capture: true });
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' || e.repeat) return;
    e.preventDefault();
    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (pressCount === 1) addPoint(0);
      else if (pressCount === 2) addPoint(1);
      else if (pressCount === 3) undo();
      else if (pressCount >= 5) reset();
      pressCount = 0;
    }, WINDOW_MS);
  });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width = 20;
  canvas.height = 1000;
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');

  function startVideo() {
    try {
      vid.srcObject = canvas.captureStream(30);
      vid.play().catch(() => {});
    } catch(e) {}
  }
  // Try immediately, retry on first interaction
  startVideo();
  document.addEventListener('click', startVideo, { once: true });
  document.addEventListener('touchstart', startVideo, { once: true });
  document.addEventListener('keydown', startVideo, { once: true });

  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2; // Cycles 0->1->0->1
    const b = Math.round(200 + t * 55);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 20, 1000);
    requestAnimationFrame(draw);
  })();
  
  function chime() {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    osc.start();
    osc.stop(ac.currentTime + 0.4);
  }

</script>
</body>
</html>
