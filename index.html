<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Padel Score</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: black;
      color: white;
      font-size: 6vw;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    #left, #right {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #top-left, #top-right {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1vh 3vw;
    }
    #points-left, #points-right {
      flex: 1;
      text-align: center;
      font-size: 28vw;
    }
    #divider {
      background: white;
      width: 20px;
      flex-shrink: 0;
    }
    #keepalive {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
  </style>
</head>
<body tabindex="0">

<div id="left">
  <div id="top-left">
    <div onclick="reset()">⏻</div>
    <div id="games-left"></div>
  </div>
  <div id="points-left" onclick="addPoint(0)">0</div>
</div>
<div id="divider">
  <video id="keepalive" autoplay playsinline muted loop></video>
</div>
<div id="right">
  <div id="top-right">
    <div id="games-right"></div>
    <div onclick="undo()">⌫</div>
  </div>
  <div id="points-right" onclick="addPoint(1)">0</div>
</div>

<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];

  let history = [];
  let state = freshState(0);

  function freshState(serving) {
    return { points: [0, 0], games: [0, 0], serving: serving};
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const opposite = 1 - side;
    const p = state.points;

    if (p[side] < 3) {
      p[side]++;
    } else if (p[side] === 3 && p[opposite] < 3) {
      winGame(side);
    } else if (p[side] === 3 && p[opposite] === 3) {
      p[side] = 4;
    } else if (p[side] === 4) {
      winGame(side);
    } else if (p[opposite] === 4) {
      p[opposite] = 3;
    }
  
    render();
    chime(side);
  }

  function chime(side) {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    //osc.frequency.value = side === 0 ? 880 : 660;
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    osc.start();
    osc.stop(ac.currentTime + 0.4);
  }

  function winGame(side) {
    state.points = [0, 0];
    state.games[side]++;
    state.serving = 1 - state.serving;
  }

  function undo() {
    if (history.length === 0) return;
    state = history.pop();
    render();
  }

  function reset() {
    let serving = 1 - state.serving;
    state = freshState(serving);
    history = [];
    render();
  }

  function render() {
    document.getElementById('points-left').textContent = POINTS[state.points[0]];
    document.getElementById('points-right').textContent = POINTS[state.points[1]];
    document.getElementById('games-left').textContent = state.games[0];
    document.getElementById('games-right').textContent = state.games[1];
    document.getElementById('left').style.background = state.serving === 0 ? 'green' : 'red';
    document.getElementById('right').style.background = state.serving === 1 ? 'green' : 'red';
  }

  render();

  // ── Button input ───────────────────────────────────────────────
  let pressCount = 0;
  let timer = null;

  document.body.focus();
  window.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); }, { capture: true });
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' || e.repeat) return;
    e.preventDefault();
    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (pressCount === 1) addPoint(state.serving);
      else if (pressCount === 2) addPoint(1 - state.serving);
      else if (pressCount === 3) undo();
      else if (pressCount >= 4) reset();
      pressCount = 0;
    }, 1000);
  });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');

  function resizeCanvas() {
    canvas.width = vid.offsetWidth;
    canvas.height = vid.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function startVideo() {
    try {
      vid.srcObject = canvas.captureStream(30);
      vid.play().catch(() => {});
    } catch(e) {}
  }
  startVideo();
  document.addEventListener('click', startVideo, { once: true });
  document.addEventListener('touchstart', startVideo, { once: true });
  document.addEventListener('keydown', startVideo, { once: true });
  
  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2;
    const b = Math.round(220 + t * 25);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 20, 1000);
    requestAnimationFrame(draw);
  })();

  // ── Debug overlay ──────────────────────────────────────────────
  let debug = false;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;font-size:3vw;padding:1vh 3vw;border-radius:8px;text-align:center;pointer-events:none;';
  document.body.appendChild(overlay);

  let longPressTimer = null;
  document.getElementById('divider').addEventListener('touchstart', () => {
    longPressTimer = setTimeout(() => {
      debug = !debug;
      overlay.style.display = debug ? 'block' : 'none';
      overlay.textContent = 'Debug ' + (debug ? 'ON' : 'OFF');
    }, 1000);
  });
  document.getElementById('divider').addEventListener('touchend', () => clearTimeout(longPressTimer));

  function showDebug(msg) {
    if (!debug) return;
    overlay.textContent = msg;
  }

  document.addEventListener('keydown', e => showDebug(`key: ${e.key} code: ${e.code}`));
  document.addEventListener('wheel', e => showDebug(`wheel: ${e.deltaY > 0 ? '↓' : '↑'} (${Math.round(e.deltaY)})`));
  document.addEventListener('mousedown', e => showDebug(`mouse: button ${e.button}`));
  document.addEventListener('touchstart', e => showDebug(`touch: ${e.touches.length} finger(s)`));

</script>
</body>
</html>
