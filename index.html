<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Padel Score</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: green;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5vh 3vw;
      flex-shrink: 0;
    }

    .ctrl {
      color: #fff;
      font-size: 4vw;
      padding: 0.5vh 1vw;
      /*cursor: pointer;*/
      /*user-select: none;*/
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl:active { color: #aaa; }

    #games-left, #games-right {
      display: flex;
      align-items: center;
      font-size: 6vw;
      gap: 1.5vw;
    }

    #scores {
      flex: 1;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    #side-left, #side-right {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      /*cursor: pointer;*/
      -webkit-tap-highlight-color: transparent;
    }

    .point {
      font-weight: 800;
      line-height: 1;
      text-align: center;
      font-size: 28vw;
    }

    #divider {
      width: 60px;
      display: flex;
      flex-shrink: 0;
      align-items: flex-start;
      justify-content: center;
    }

    #keepalive {
      display: block;
      width: 20px;
      height: 100%;
      border-radius: 3px;
      margin: 0;
    }
  </style>
</head>
<body tabindex="0">

<div id="topbar">
  <div class="ctrl" onclick="reset()">♻</div>
  <div id="games-left"></div>
  <div id="games-right"></div>
  <div class="ctrl" onclick="undo()">⌫</div>
</div>

<div id="scores">
  <div id="side-left" onclick="addPoint(0)">
    <div class="point" id="pt-left">0</div>
  </div>

  <div id="divider">
    <video id="keepalive" autoplay playsinline muted loop></video>
  </div>

  <div id="side-right" onclick="addPoint(1)">
    <div class="point" id="pt-right">0</div>
  </div>
</div>

<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];

  let history = [];
  let state = freshState();

  function freshState() {
    return { pts: [0, 0], games: [0, 0] };
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const opposite = 1 - side;
    const p = state.pts;

    if (p[side] < 3) {
      p[side]++;
    } else if (p[side] === 3 && p[opposite] < 3) {
      winGame(side);
    } else if (p[side] === 3 && p[opposite] === 3) {
      p[side] = 4;
    } else if (p[side] === 4) {
      winGame(side);
    } else if (p[opposite] === 4) {
      p[opposite] = 3;
    }

    render();
  }

  function winGame(side) {
    state.pts = [0, 0];
    state.games[side]++;
  }

  function undo() {
    if (history.length === 0) return;
    state = history.pop();
    render();
  }

  function reset() {
    history = [];
    state = freshState();
    render();
  }

  function render() {
    const ptL = POINTS[state.pts[0]];
    const ptR = POINTS[state.pts[1]];
    document.getElementById('pt-left').textContent = ptL;
    document.getElementById('pt-right').textContent = ptR;
    document.getElementById('games-left').innerHTML = state.games[0];
    document.getElementById('games-right').innerHTML = state.games[1];
  }
 
  render();

  // ── Button input ───────────────────────────────────────────────
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;

  document.body.focus();
  window.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); }, { capture: true });
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' || e.repeat) return;
    e.preventDefault();
    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (pressCount === 1) addPoint(0);
      else if (pressCount === 2) addPoint(1);
      else if (pressCount >= 3) undo();
      pressCount = 0;
    }, WINDOW_MS);
  });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width = 20;
  canvas.height = 1000;
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');

  function startVideo() {
    try {
      vid.srcObject = canvas.captureStream(30);
      vid.play().catch(() => {});
    } catch(e) {}
  }
  // Try immediately, retry on first interaction
  startVideo();
  document.addEventListener('click', startVideo, { once: true });
  document.addEventListener('touchstart', startVideo, { once: true });
  document.addEventListener('keydown', startVideo, { once: true });

  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2; // Cycles 0->1->0->1
    const b = Math.round(200 + t * 55);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 20, 800);
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
