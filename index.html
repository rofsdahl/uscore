<!DOCTYPE html>
<html lang="en">
<head>
  <title>Padel Score</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: black;
      color: white;
      font-size: 12vw;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100dvh;
      display: flex;
      user-select: none;
      -webkit-user-select: none;
    }
    #left, #right {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #games-left {
      margin-bottom: -3vh;
      padding-right: 3vw;
      text-align: right;
    }
    #games-right {
      margin-bottom: -3vh;
      padding-left: 3vw;
      text-align: left;
    }
    #points-left, #points-right {
      text-align: center;
      font-size: 28vw;
      font-weight: 800;
    }
    #divider {
      background: white;
      width: 20px;
    }
    #keepalive {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    #info {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      max-width: 50vw;
      max-height: 50vh;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 5vw;
      font-weight: 400;
      text-align: center;
      padding: 4vw 6vw;
      border-radius: 16px;
      z-index: 10;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body tabindex="0">
<div id="left">
  <div id="games-left">0</div>
  <div id="points-left">0</div>
</div>
<div id="divider">
  <video id="keepalive" autoplay playsinline muted loop></video>
</div>
<div id="right">
  <div id="games-right">0</div>
  <div id="points-right">0</div>
</div>
<div id="info">
  ↑ new match<br/>
  ← add point →<br/>
  ↓ undo
</div>

<script>
  // ── Scoring ────────────────────────────────────────────────────
  const POINTS = ['0', '15', '30', '40', 'AD'];
  let history = [];
  let state = freshState(0);

  function freshState(serving) {
    return { points: [0, 0], games: [0, 0], serving: serving};
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const other = 1 - side;
    const p = state.points;
    if (p[side] < 3) p[side]++;
    else if (p[side] === 4) winGame(side);
    else if (p[other]  < 3) winGame(side);
    else if (p[other] === 3) p[side]  = 4;
    else if (p[other] === 4) p[other] = 3;
    render();
  }

  function undo() {
    if (history.length === 0) return; 
    state = history.pop();
    render();
  }

  function newMatch() {
    let serving = 1 - state.serving;
    state = freshState(serving);
    history = [];
    render();
  }

  function winGame(side) {
    state.points = [0, 0];
    state.games[side]++;
    state.serving = 1 - state.serving;
  }

  function render() {
    document.getElementById('points-left').textContent = POINTS[state.points[0]];
    document.getElementById('points-right').textContent = POINTS[state.points[1]];
    document.getElementById('games-left').textContent = state.games[0];
    document.getElementById('games-right').textContent = state.games[1];
    document.getElementById('left').style.background = state.serving === 0 ? 'green' : 'red';
    document.getElementById('right').style.background = state.serving === 1 ? 'green' : 'red';
  }
  render();

  // ── Info ───────────────────────────────────────────────────────
  let infoTimer = null;
  function showInfo() {
    const info = document.getElementById('info');
    info.style.opacity = '1';
    info.style.display = 'block';
    clearTimeout(infoTimer);
      infoTimer = setTimeout(() => {
      info.style.opacity = '0';
      setTimeout(() => info.style.display = 'none', 400);
    }, 3000);
  }
  showInfo();

  // ── Pointer move input ─────────────────────────────────────────
  let startX;
  let startY;
  document.addEventListener('pointerdown', e => {
    startX = e.clientX;
    startY = e.clientY;
  });
  document.addEventListener('pointerup', e => {
    const dx = Math.trunc(e.clientX - startX);
    const dy = Math.trunc(e.clientY - startY);
    if      (dx >  100) addPoint(0);
    else if (dx < -100) addPoint(1);
    else if (dy >  100) newMatch();
    else if (dy < -100) undo();
    else showInfo();
  });
  
  // Disable default touch scroll behavior
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');

  function resizeCanvas() {
    canvas.width = vid.offsetWidth;
    canvas.height = vid.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function startVideo() {
    try {
      vid.srcObject = canvas.captureStream(30);
      vid.play().catch(() => {});
    } catch(e) {}
  }
  startVideo();
  document.addEventListener('click', startVideo, { once: true });
  document.addEventListener('touchstart', startVideo, { once: true });
  document.addEventListener('keydown', startVideo, { once: true });
  
  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2;
    const b = Math.round(250 + t * 5);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 20, 1000);
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
