<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Button Tester</title>
  <meta name="theme-color" content="#000000" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* Default: landscape — fill viewport normally */
    body {
      width: 100vw;
      height: 100vh;
    }

    /* Portrait: rotate the whole body 90deg to fake landscape */
    @media screen and (orientation: portrait) {
      body {
        position: absolute;
        top: 0;
        left: 100%;
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
        transform-origin: top left;
      }
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #event-name {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      min-height: 6rem;
    }
  </style>
</head>
<body tabindex="0">

  <h1>Button Tester 2026-06-27 13:44</h1>
  <div id="event-name"></div>

<script>
  const WINDOW_MS = 400;
  let pressCount = 0;
  let timer = null;
  const eventName = document.getElementById('event-name');
  const labels = { 1: 'SINGLE', 2: 'DOUBLE', 3: 'TRIPLE' };

  document.body.focus();

  // Keep screen awake
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {
      console.log('Wake lock failed:', e);
    }
  }
  requestWakeLock();

  // Re-acquire after tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') e.preventDefault();
  }, { capture: true });

  document.addEventListener('keydown', (e) => {
    if (e.key !== ' ') return;
    e.preventDefault();
    if (e.repeat) return;

    pressCount++;
    clearTimeout(timer);
    timer = setTimeout(() => {
      eventName.textContent = labels[pressCount] || `×${pressCount}`;
      pressCount = 0;
    }, WINDOW_MS);
  });
</script>

</body>
</html>
