<!DOCTYPE html>
<html lang="en">
<head>
  <title>Court Score</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: black;
      color: white;
      font-size: 8vw;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100vw;
      height: 100dvh;
      display: flex;
      user-select: none;
      -webkit-user-select: none;
    }
    #left, #right {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #top-left, #top-right {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vh 3vw 0;
    }
    #serve-left, #serve-right {
      font-size: 7vw;
      -webkit-text-stroke: 4px white;
    }
    #points-left, #points-right {
      flex: 1;
      text-align: center;
      font-size: 28vw;
    }
    #divider {
      background: white;
      width: 20px;
    }
    #keepalive {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
  </style>
</head>
<body tabindex="0">
<div id="left">
  <div id="top-left">
    <div></div>
    <div id="games-left"></div>
    <div id="serve-left"></div>
  </div>
  <div id="points-left">0</div>
</div>
<div id="divider">
  <video id="keepalive" autoplay playsinline muted loop></video>
</div>
<div id="right">
  <div id="top-right">   
    <div id="serve-right"></div>
    <div id="games-right"></div>
    <div></div>
  </div>
  <div id="points-right">0</div>
</div>
<script>
  const POINTS = ['0', '15', '30', '40', 'AD'];
  let history = [];
  let state = freshState(0);

  function freshState(serving) {
    return { points: [0, 0], games: [0, 0], serving: serving};
  }

  function reset() {
    let serving = 1 - state.serving;
    state = freshState(serving);
    history = [];
    render();
  }

  function undo() {
    if (history.length === 0) return; 
    state = history.pop();
    render();
  }

  function addPoint(side) {
    history.push(JSON.parse(JSON.stringify(state)));
    const other = 1 - side;
    const p = state.points;
    if (p[side] < 3) p[side]++;
    else if (p[side] === 4) winGame(side);
    else if (p[other] < 3) winGame(side);
    else if (p[other] === 3) p[side] = 4;
    else if (p[other] === 4) p[other] = 3;
    render();
  }

  function winGame(side) {
    state.points = [0, 0];
    state.games[side]++;
    state.serving = 1 - state.serving;
  }

  function render() {
    document.getElementById('points-left').textContent = POINTS[state.points[0]];
    document.getElementById('points-right').textContent = POINTS[state.points[1]];
    document.getElementById('games-left').textContent = state.games[0];
    document.getElementById('games-right').textContent = state.games[1];
    let dir = (((state.points[0] + state.points[1]) % 2) === 0) ? '⟋' : '⟍';
    document.getElementById('serve-left').textContent = state.serving === 0 ? dir : '';
    document.getElementById('serve-right').textContent = state.serving === 1 ? dir : '';
    document.getElementById('left').style.background = state.serving === 0 ? 'green' : 'red';
    document.getElementById('right').style.background = state.serving === 1 ? 'green' : 'red';
  }

  render();

  // ── Splash screen ──────────────────────────────────────────────
  const splash = document.createElement('div');
  splash.style.cssText = `
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65);
    font-size: 5vw; font-weight: 400;
    line-height: 2.2; text-align: center;
    z-index: 10;
  `;
  splash.innerHTML = '<div>↑ reset / switch serve<br>↓ undo<br>← point left<br>→ point right</div>';
  document.body.appendChild(splash);
  splash.addEventListener('pointerdown', () => splash.remove(), { once: true });

  // ── Pointer move input ──────────────────────────────────────────────
  let startX;
  let startY;
  document.addEventListener('pointerdown', e => {
    startX = e.clientX;
    startY = e.clientY;
  });
  document.addEventListener('pointerup', e => {
    const dx = Math.trunc(e.clientX - startX);
    const dy = Math.trunc(e.clientY - startY);
    if      (dx >  100) addPoint(0);
    else if (dx < -100) addPoint(1);
    else if (dy >  100) reset();
    else if (dy < -100) undo();
  });

  // Disable default touch scroll behavior
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ── Wake lock ──────────────────────────────────────────────────
  async function requestWakeLock() {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // ── Canvas → video keepalive ───────────────────────────────────
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const vid = document.getElementById('keepalive');

  function resizeCanvas() {
    canvas.width = vid.offsetWidth;
    canvas.height = vid.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function startVideo() {
    try {
      vid.srcObject = canvas.captureStream(30);
      vid.play().catch(() => {});
    } catch(e) {}
  }
  startVideo();
  document.addEventListener('click', startVideo, { once: true });
  document.addEventListener('touchstart', startVideo, { once: true });
  document.addEventListener('keydown', startVideo, { once: true });
  
  let phase = 0;
  (function draw() {
    phase += 0.015;
    const t = (Math.sin(phase) + 1) / 2;
    const b = Math.round(250 + t * 5);
    ctx.fillStyle = `rgb(${b},${b},${b})`;
    ctx.fillRect(0, 0, 20, 1000);
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
